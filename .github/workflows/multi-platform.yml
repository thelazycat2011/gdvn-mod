name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          - name: macOS
            os: macos-latest

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

          - name: iOS
            os: macos-latest
            target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          build-args: '--parallel 16'

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: [ 'build' ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve mod version
        id: mod
        shell: bash
        run: |
          version="$(jq -r '.version' mod.json)"

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Cannot resolve mod version from mod.json" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Fetch version branch
        shell: bash
        run: |
          git fetch origin "${{ steps.mod.outputs.version }}:${{ steps.mod.outputs.version }}"

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Resolve packaged mod file
        id: asset
        shell: bash
        run: |
          build_output='${{ steps.build.outputs.build-output }}'

          if [ -f "$build_output" ]; then
            asset_path="$build_output"
          else
            mapfile -t geode_files < <(find "$build_output" -type f -name '*.geode' | sort)

            if [ "${#geode_files[@]}" -eq 0 ]; then
              echo "No .geode file found in $build_output" >&2
              exit 1
            fi

            if [ "${#geode_files[@]}" -gt 1 ]; then
              printf 'Expected exactly one .geode file in %s, found:\n' "$build_output" >&2
              printf ' - %s\n' "${geode_files[@]}" >&2
              exit 1
            fi

            asset_path="${geode_files[0]}"
          fi

          echo "path=$asset_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$asset_path")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.asset.outputs.path }}

      - name: Resolve release notes from PR commits
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: notes
        uses: actions/github-script@v7
        env:
          VERSION_BRANCH: ${{ steps.mod.outputs.version }}
          RELEASE_TAG: ${{ steps.mod.outputs.tag }}
        with:
          script: |
            const { owner, repo } = context.repo;

            const versionBranch = process.env.VERSION_BRANCH;
            const releaseTag = process.env.RELEASE_TAG;

            const allowedTypes = new Map([
              ['feat', 'Features'],
            ]);

            const commits = await github.paginate(
              github.rest.repos.compareCommitsWithBasehead,
              {
                owner,
                repo,
                basehead: `${versionBranch}...main`,
                per_page: 100,
              },
              response => response.data.commits,
            );

            if (commits.length === 0) {
              core.warning(`No commits found between ${versionBranch} and main.`);
              core.setOutput('notes', '');
              core.setOutput('title', '');
              core.setOutput('tag', '');
              return;
            }

            const groups = new Map();

            for (const commit of commits) {
              const firstLine = (commit.commit.message || '').split('\n')[0].trim();

              const match = firstLine.match(
                /^(?<type>[a-z]+)(?:\([^)]+\))?(?<breaking>!)?:\s+(?<subject>.+)$/i
              );

              if (!match?.groups) continue;

              const type = match.groups.type.toLowerCase();
              const subject = match.groups.subject.trim();

              if (!allowedTypes.has(type)) continue;

              const section = allowedTypes.get(type);
              if (!groups.has(section)) groups.set(section, []);
              groups.get(section).push(`- ${subject}`);
            }

            const notes = [...groups.entries()]
              .map(([section, items]) => `### ${section}\n${items.join('\n')}`)
              .join('\n\n');

            if (!notes) {
              core.warning('No feat commits found; skipping release creation.');
              core.setOutput('notes', '');
              core.setOutput('title', '');
              core.setOutput('tag', '');
              return;
            }

            core.setOutput('title', releaseTag);
            core.setOutput('tag', releaseTag);
            core.setOutput('notes', notes);

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.notes.outputs.tag != ''
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.asset.outputs.path }}
          body: ${{ steps.notes.outputs.notes }}
          commit: ${{ github.sha }}
          makeLatest: true
          name: ${{ steps.notes.outputs.title }}
          replacesArtifacts: true
          tag: ${{ steps.notes.outputs.tag }}